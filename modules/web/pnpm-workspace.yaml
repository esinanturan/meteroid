packages:
  - 'packages/*'
  - 'web-app'
engineStrict: true
nodeLinker: hoisted
publicHoistPattern:
  - '*prisma*'
  - '*eslint*'
  - '*storybook*'
strictPeerDependencies: false
overrides:
  'next@>=16.0.0 <16.2.6': '16.2.6'
  'lodash@<4.18.1': '4.18.1'
  'd3-color@<3.1.0': '3.1.0'
  'cross-spawn@<7.0.6': '7.0.6'
  'ajv@>=6.0.0 <6.12.6': '6.12.6'
  'postcss@<8.5.10': '8.5.10'
  'minimatch@>=3.0.0 <3.1.4': '3.1.4'
  'minimatch@>=9.0.0 <9.0.7': '9.0.7'
  'glob@>=10.0.0 <10.5.0': '10.5.0'
  'tar@>=7.0.0 <7.5.11': '7.5.11'
  'uuid@>=11.0.0 <11.1.1': '11.1.1'
  'esbuild@<0.28.1': '0.28.1'
allowBuilds:
  '@bufbuild/buf': true
  '@md/icons': true
  '@parcel/watcher': false
  core-js: false
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false
